version = 1

[channel]
id = "email"
launch = "background"
worker = "scripts/worker"
env = [
  "EMAIL_AUTH_MODE",
  "EMAIL_IMAP_HOST",
  "EMAIL_IMAP_USERNAME",
  "EMAIL_SMTP_HOST",
  "EMAIL_SMTP_USERNAME",
  "EMAIL_ADDRESS",
  "EMAIL_AUTH_RESULTS_HOST",
]

optional_env = [
  "EMAIL_ADMIN_DIGEST_TO",
  "EMAIL_DIGEST_INTERVAL_MS",
  "EMAIL_FETCH_LIMIT",
  "EMAIL_FROM_NAME",
  "EMAIL_IMAP_PASSWORD",
  "EMAIL_IMAP_MAILBOX",
  "EMAIL_IMAP_PORT",
  "EMAIL_IMAP_TLS",
  "EMAIL_MAILBOX_ID",
  "EMAIL_MAX_MESSAGE_BYTES",
  "EMAIL_OUTBOX_LEASE_MS",
  "EMAIL_OUTBOX_PULL_LIMIT",
  "EMAIL_POLL_MS",
  "EMAIL_SMTP_PASSWORD",
  "EMAIL_SMTP_IMPLICIT_TLS",
  "EMAIL_SMTP_PORT",
  "EMAIL_SMTP_TLS",
  "EMAIL_XOAUTH2_TOKEN_CMD",
]

[channel.setup]
command = "bin/lionclaw-channel-email"
args = ["setup"]
